<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }
    #player { width: 100%; height: 100%; }

    /* Queue indicator — subtle overlay bottom-left */
    #queue-status {
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      background: rgba(0,0,0,0.7);
      color: #aaa;
      font-family: monospace;
      font-size: 0.75rem;
      padding: 0.35rem 0.65rem;
      border-radius: 4px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #queue-status.visible { opacity: 1; }
  </style>
</head>
<body>
  <div id="player"></div>
  <div id="queue-status"></div>

  <!-- YouTube IFrame API -->
  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    // ── State ──────────────────────────────────────────────────
    let ytPlayer   = null;   // YT.Player instance
    let apiReady   = false;  // IFrame API loaded flag
    let queue      = [];     // array of video IDs for current page
    let queueIndex = 0;      // current position in queue
    let pendingId  = null;   // video to load once API is ready

    // ── IFrame API callback ────────────────────────────────────
    function onYouTubeIframeAPIReady() {
      apiReady = true;
      const params = new URLSearchParams(window.location.search);
      const initial = params.get('v');
      const qParam  = params.get('q');  // optional comma-separated queue

      if (qParam) {
        queue = qParam.split(',').filter(Boolean);
        queueIndex = 0;
      }

      const firstId = initial || queue[0] || null;
      if (firstId) {
        createPlayer(firstId);
      } else {
        // Create blank player waiting for messages
        createPlayer('');
      }
    }

    function createPlayer(videoId) {
      ytPlayer = new YT.Player('player', {
        videoId: videoId || undefined,
        playerVars: {
          autoplay:        1,
          rel:             0,
          modestbranding:  1,
          iv_load_policy:  3,   // hide annotations
        },
        events: {
          onStateChange: onPlayerStateChange,
        }
      });
    }

    // ── Auto-advance when a video ends ─────────────────────────
    function onPlayerStateChange(event) {
      // YT.PlayerState.ENDED = 0
      if (event.data === YT.PlayerState.ENDED) {
        playNext();
      }
    }

    function playNext() {
      if (queue.length === 0) return;
      queueIndex++;
      if (queueIndex < queue.length) {
        ytPlayer.loadVideoById(queue[queueIndex]);
        showQueueStatus(queueIndex + 1, queue.length);
      } else {
        // End of queue — clear it
        queue = [];
        queueIndex = 0;
        hideQueueStatus();
      }
    }

    // ── Load a single video (replaces queue) ───────────────────
    function loadVideo(videoId) {
      queue = [videoId];
      queueIndex = 0;
      if (ytPlayer && apiReady) {
        ytPlayer.loadVideoById(videoId);
        hideQueueStatus();
      }
    }

    // ── Load a queue of videos ─────────────────────────────────
    function loadQueue(videoIds) {
      if (!videoIds || !videoIds.length) return;
      queue = videoIds.filter(Boolean);
      queueIndex = 0;
      if (ytPlayer && apiReady) {
        ytPlayer.loadVideoById(queue[0]);
        if (queue.length > 1) showQueueStatus(1, queue.length);
      }
    }

    // ── Queue status overlay ───────────────────────────────────
    let statusTimer = null;
    function showQueueStatus(pos, total) {
      const el = document.getElementById('queue-status');
      el.textContent = `▶ ${pos} / ${total}`;
      el.classList.add('visible');
      clearTimeout(statusTimer);
      statusTimer = setTimeout(hideQueueStatus, 3000);
    }
    function hideQueueStatus() {
      document.getElementById('queue-status').classList.remove('visible');
    }

    // ── Listen for messages from the Watchlog site ─────────────
    window.addEventListener('message', (event) => {
      if (!event.data) return;

      // Single video
      if (event.data.videoId) {
        loadVideo(event.data.videoId);
      }

      // Page queue (array of video IDs)
      if (event.data.queue && Array.isArray(event.data.queue)) {
        loadQueue(event.data.queue);
      }
    });
  </script>
</body>
</html>
